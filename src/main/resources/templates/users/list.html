<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ユーザー一覧')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <h1 class="mb-4">ユーザー一覧</h1>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>ユーザー名</th>
                <th>氏名</th>
                <th>メール</th>
                <th>ロール</th>
                <th>有効</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">tanaka</td>
                <td th:text="${user.fullName}">田中太郎</td>
                <td th:text="${user.email}">tanaka@example.com</td>
                <td>
                    <span class="badge"
                          th:classappend="${user.role == 'ADMIN'} ? ' text-bg-danger' : ' text-bg-primary'"
                          th:text="${user.role}">
                        USER
                    </span>
                </td>
                <td>
                    <span class="badge"
                          th:classappend="${user.active} ? ' text-bg-success' : ' text-bg-secondary'"
                          th:text="${user.active} ? '有効' : '無効'">
                        有効
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
