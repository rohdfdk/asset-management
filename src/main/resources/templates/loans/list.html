<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('貸出一覧')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>貸出一覧</h1>
        <a class="btn btn-primary" th:href="@{/loans-view/new}">貸出登録</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>資産</th>
                <th>利用者</th>
                <th>貸出日</th>
                <th>返却予定日</th>
                <th>返却日</th>
                <th>状態</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="loan : ${loans}">
                <td th:text="${loan.id}">1</td>
                <td th:text="${loan.asset.name}">ノートPC</td>
                <td th:text="${loan.user.fullName}">田中太郎</td>
                <td th:text="${loan.loanDate}">2026-06-01</td>
                <td th:text="${loan.expectedReturnDate}">2026-06-30</td>
                <td th:text="${loan.actualReturnDate != null ? loan.actualReturnDate : '-'}">-</td>
                <td>
                    <span class="badge"
                          th:classappend="${loan.status == 'ACTIVE'} ? ' text-bg-warning' :
                                          (${loan.status == 'RETURNED'} ? ' text-bg-success' : ' text-bg-danger')"
                          th:text="${loan.status}">
                        ACTIVE
                    </span>
                </td>
                <td>
                    <form th:if="${loan.status == 'ACTIVE'}"
                          th:action="@{/loans-view/{id}/return(id=${loan.id})}"
                          method="post"
                          class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-success">
                            返却
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
