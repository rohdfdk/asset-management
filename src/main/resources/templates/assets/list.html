<!doctype html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('資産一覧')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-4">資産一覧</h1>
        <a class="btn btn-primary"
           th:href="@{/assets-view/new}"
           sec:authorize="hasRole('ADMIN')">
            資産登録
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>資産コード</th>
                <th>名称</th>
                <th>カテゴリ</th>
                <th>状態</th>
                <th>場所</th>
                <th sec:authorize="hasRole('ADMIN')">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="asset : ${assets}">
                <td th:text="${asset.id}">1</td>
                <td th:text="${asset.assetCode}">PC001</td>
                <td th:text="${asset.name}">ノートPC</td>
                <td th:text="${asset.category}">PC</td>
                <td>
                    <span class="badge"
                          th:classappend="${asset.status == 'AVAILABLE'} ? ' text-bg-success' :
                                          (${asset.status == 'LOANED'} ? ' text-bg-warning' :
                                          (${asset.status == 'MAINTENANCE'} ? ' text-bg-secondary' : ' text-bg-dark'))"
                          th:text="${asset.status}">
                        AVAILABLE
                    </span>
                </td>
                <td th:text="${asset.location}">オフィス</td>
                <td sec:authorize="hasRole('ADMIN')">
                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/assets-view/{id}/edit(id=${asset.id})}">
                        編集
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
